# .goreleaser.yml
version: 2
project_name: FirstClick

builds:
  - id: firstclick
    main: ./cmd/firstclick
    binary: firstclick
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: firstclick-archive
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - LICENSE
      - static/**

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
release:
  github:
    owner: sachinggsingh
    name: FirstClick
  draft: false
  prerelease: auto

dockers_v2:
  - id: firstclick
    # The image name (repository)
    images:
      - "ghcr.io/sachinggsingh/firstclick"
    # Tags to apply to the images
    tags:
      - "{{.Version}}"
      - "latest"
    dockerfile: Dockerfile.goreleaser
    # Target platforms for the multi-arch manifest
    platforms:
      - linux/amd64
      - linux/arm64
    # Include static files in the Docker build context
    extra_files:
      - static/
    # Annotations/Labels for the image
    labels:
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.revision: "{{.FullCommit}}"
      org.opencontainers.image.source: "{{.GitURL}}"