name: Docker Build & Push

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run Tests
        run: go test -v ./...

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/firstclick:latest
            ghcr.io/${{ github.repository_owner }}/firstclick:${{ github.sha }}
            
      - name: Login to Docker-Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCER_PASSWORD }}
       - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/firstclick:${{github.sha}} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/firstclick:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/firstclick:latest

      -  name: Login to DockerHub
          uses: docker/login-action@v3
          with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      -  name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/firstclick:${{github.sha}}
          docker push ${{ secrets.DOCKER_USERNAME }}/firstclick:latest